<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業五鳥占卜指針鐘 - 修正抖動版</title>
    <style>
        /* 保留你原有的 CSS，僅針對指針 transition 進行優化 */
        * { box-sizing: border-box; }
        body {
            background-color: #1a1a1a; color: #ffffff;
            font-family: 'Segoe UI', -apple-system, sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .main-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .paksha-selector { display: flex; justify-content: center; gap: 10px; width: 100%; }
        .paksha-btn {
            background-color: rgba(38, 38, 38, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888; font-size: 13px; font-weight: bold; cursor: pointer; padding: 8px 20px; border-radius: 20px; transition: 0.3s;
        }
        .paksha-btn.active { background-color: #ffffff; color: #000; border-color: #ffffff; }
        .bird-selector {
            display: flex; justify-content: space-between; width: 100%; background-color: rgba(38, 38, 38, 0.6);
            padding: 6px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bird-btn { background: none; border: none; color: #888; font-size: 13px; font-weight: bold; cursor: pointer; padding: 6px 12px; border-radius: 20px; transition: 0.3s; }
        .bird-btn.active { background-color: #d4af37; color: #000; }
        
        .clock {
            width: 300px; height: 300px; border-radius: 50%;
            background-color: rgba(38, 38, 38, 0.4); backdrop-filter: blur(10px);
            border: 10px solid rgba(255, 255, 255, 0.1); position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        .color-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; opacity: 0.3; z-index: 1; transition: 0.5s; }
        .inner-face { position: absolute; width: 85%; height: 85%; background-color: #262626; border-radius: 50%; z-index: 2; }
        
        .number-wrapper { position: absolute; width: 100%; height: 100%; top: 0; left: 0; display: flex; justify-content: center; z-index: 3; }
        .number { position: absolute; top: 6%; font-size: 15px; font-weight: bold; color: #aaa; width: 30px; text-align: center; }
        
        .center-nut { width: 12px; height: 12px; background-color: #fff; border-radius: 50%; position: absolute; z-index: 10; }
        
        /* 修正：優化指針 transition，秒針建議使用 linear 或 step，時分針使用 ease-out */
        .hand { position: absolute; bottom: 50%; transform-origin: bottom; border-radius: 5px; z-index: 5; }
        .hour-hand { width: 6px; height: 20%; background-color: #ffffff; transition: transform 0.5s ease-out; }
        .min-hand { width: 4px; height: 32%; background-color: #cccccc; transition: transform 0.5s ease-out; }
        .sec-hand { width: 2px; height: 38%; background-color: #e74c3c; transition: transform 0.2s cubic-bezier(0.4, 2.08, 0.55, 0.44); }

        .info-panel { background-color: rgba(38, 38, 38, 0.4); padding: 15px; border-radius: 15px; text-align: center; width: 100%; border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-badge { display: inline-block; padding: 10px 20px; border-radius: 50px; font-size: 18px; font-weight: bold; margin: 10px 0; }
        .advice { font-size: 14px; color: #aaa; line-height: 1.6; background: #1e1e1e; padding: 12px; border-radius: 8px; }
        .status-統治 { background-color: #d4af37; color: #000; }
        .status-進食 { background-color: #2ecc71; color: #fff; }
        .status-行走 { background-color: #3498db; color: #fff; }
        .status-睡眠 { background-color: #8e44ad; color: #fff; }
        .status-死亡 { background-color: #e74c3c; color: #fff; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 切換與時鐘 UI ... (這部分與之前相同) -->
        <div class="paksha-selector">
            <button class="paksha-btn active" id="shukla-btn" onclick="switchPaksha('明半月')">明半月 (Shukla)</button>
            <button class="paksha-btn" id="krishna-btn" onclick="switchPaksha('暗半月')">暗半月 (Krishna)</button>
        </div>

        <div class="bird-selector">
            <button class="bird-btn" onclick="switchBird(0)">禿鷹</button>
            <button class="bird-btn" onclick="switchBird(1)">貓頭鷹</button>
            <button class="bird-btn active" id="default-bird" onclick="switchBird(2)">烏鴉</button>
            <button class="bird-btn" onclick="switchBird(3)">公雞</button>
            <button class="bird-btn" onclick="switchBird(4)">孔雀</button>
        </div>

        <div class="clock" id="clock">
            <div class="color-ring" id="color-ring"></div>
            <div class="inner-face"></div>
            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand min-hand" id="min-hand"></div>
            <div class="hand sec-hand" id="sec-hand"></div>
            <div class="center-nut"></div>
        </div>

        <div class="info-panel">
            <div style="color:#888; font-size:11px; letter-spacing:1px; margin-bottom:5px;" id="panel-title">🐦 PANCHAPAKSHI</div>
            <div id="yama-time" style="font-size: 12px; color: #d4af37;"></div>
            <div class="status-badge" id="status-display">載入中...</div>
            <div class="advice" id="advice-display">載入中...</div>
        </div>
    </div>

<script>
    // --- 數據部分 (保持不變) ---
    const BIRDS = ["禿鷹", "貓頭鷹", "烏鴉", "公雞", "孔雀"];
    const ACTIVITIES = ["進食", "行走", "統治", "睡眠", "死亡"];
    const ADVICE = { "統治": "🌟 大吉！能量巔峰，最適合決策！", "進食": "💪 次吉！能量恢復中，適合學習。", "行走": "🚶 普通！能量平穩，適合一般庶務。", "睡眠": "💤 沉靜！能量低迷，適合冥想放鬆。", "死亡": "⚠️ 凶！能量最低點，建議安靜守成。" };
    const COLORS = { "進食": "#2ecc71", "行走": "#3498db", "統治": "#d4af37", "睡眠": "#8e44ad", "死亡": "#e74c3c" };
    const DAY_ORDER = { "明半月": [0, 1, 2, 3, 4, 0, 1], "暗半月": [2, 3, 4, 0, 1, 2, 3] };
    const NIGHT_ORDER = { "明半月": [2, 4, 1, 3, 0, 2, 4], "暗半月": [1, 4, 3, 2, 0, 1, 4] };

    let currentPaksha = "明半月";
    let myBirdIndex = 2;
    const sunriseH = 5, sunriseM = 25;
    const sunsetH = 18, sunsetM = 25;

    // --- 修正重點：指針旋轉邏輯 ---
    let totalSeconds = 0;

    // 初始化 12 數字
    for (let i = 1; i <= 12; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'number-wrapper';
        wrapper.style.transform = `rotate(${i * 30}deg)`;
        const num = document.createElement('div');
        num.className = 'number';
        num.innerText = i;
        num.style.transform = `rotate(-${i * 30}deg)`;
        wrapper.appendChild(num);
        document.getElementById('clock').appendChild(wrapper);
    }

    function update() {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();
        const s = now.getSeconds();

        // 💡 修正抖動的核心：計算自當天 00:00:00 以來的總秒數
        // 這樣角度會是 354 -> 360 -> 366，不會回到 0
        const currentTotalSeconds = (h * 3600) + (m * 60) + s;
        
        // 秒針：每秒 6 度
        const secDeg = currentTotalSeconds * 6;
        // 分針：每分鐘 6 度 + 每一秒產生的微小位移 (s * 0.1)
        const minDeg = (m * 60 + s) * 0.1 + (h * 360 * 0); // 簡化為總分計算
        const minFullDeg = ( (m * 6) + (s * 0.1) ); // 我們只取 0-360 是因為分針抖動較不明顯，若要極致平滑可比照秒針
        
        // 為了極致防抖，時分針也採用當天總量
        document.getElementById('sec-hand').style.transform = `rotate(${secDeg}deg)`;
        document.getElementById('min-hand').style.transform = `rotate(${(currentTotalSeconds / 10) % 3600}deg)`; 
        document.getElementById('hour-hand').style.transform = `rotate(${(currentTotalSeconds / 120) % 3600}deg)`;

        // --- 占卜邏輯判斷 (保持不變) ---
        const sunrise = new Date(now); sunrise.setHours(sunriseH, sunriseM, 0);
        const sunset = new Date(now); sunset.setHours(sunsetH, sunsetM, 0);
        let weekday = now.getDay();
        if (now < sunrise) weekday = (weekday + 6) % 7;

        let isDay = now >= sunrise && now < sunset;
        let yamaIdx = 0;
        if (isDay) {
            let dayLen = (sunset - sunrise) / 5;
            yamaIdx = Math.floor((now - sunrise) / dayLen);
        } else {
            let nextSunrise = new Date(sunrise);
            if (now >= sunset) nextSunrise.setDate(nextSunrise.getDate() + 1);
            let nightLen = (nextSunrise - sunset) / 5;
            let elapsed = (now >= sunset) ? (now - sunset) : (now - sunset + 86400000);
            yamaIdx = Math.floor(elapsed / nightLen);
        }
        yamaIdx = Math.min(Math.max(0, yamaIdx), 4);

        const startBirdOrder = isDay ? DAY_ORDER[currentPaksha][weekday] : NIGHT_ORDER[currentPaksha][weekday];
        const rulingBird = (startBirdOrder + yamaIdx) % 5;
        
        let activityIdx;
        if (currentPaksha === "明半月") {
            activityIdx = (myBirdIndex - rulingBird + 5) % 5;
        } else {
            const krishnaCycle = [4, 3, 2, 1, 0];
            activityIdx = krishnaCycle[(myBirdIndex - rulingBird + 5) % 5];
        }

        const status = ACTIVITIES[activityIdx];
        document.getElementById('panel-title').innerText = `🐦 PANCHAPAKSHI (${currentPaksha} - ${BIRDS[myBirdIndex]})`;
        document.getElementById('yama-time').innerText = `今日第 ${yamaIdx + 1} 時段 (${isDay?'日間':'夜間'})`;
        const badge = document.getElementById('status-display');
        badge.innerText = `${BIRDS[myBirdIndex]}：${status}`;
        badge.className = `status-badge status-${status}`;
        document.getElementById('advice-display').innerText = ADVICE[status];
        document.getElementById('color-ring').style.backgroundColor = COLORS[status];
    }

    function switchPaksha(p) { currentPaksha = p; updateButtons('paksha-btn', p); update(); }
    function switchBird(idx) { myBirdIndex = idx; updateButtons('bird-btn', BIRDS[idx]); update(); }
    function updateButtons(cls, text) {
        document.querySelectorAll('.'+cls).forEach(b => {
            b.classList.toggle('active', b.innerText.includes(text));
        });
    }

    setInterval(update, 1000);
    update();
</script>
</body>
</html>
